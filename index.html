<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo à Locarno</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <div class="container">
        <div id="loading"> Chargement des données météo...</div>
        <div id="error"></div>

        <section id="current-weather"></section>

        <h2 class="hourly-section-title">Prévisions 24h</h2>
        <section id="hourly-forecast">
            <div class="chart-container">
                <canvas id="hourlyChart"></canvas>
            </div>
        </section>

        <h2 class="chart-section-title">Prévisions 10 jours</h2>
        <div class="chart-container">
            <canvas id="temperatureChart"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
