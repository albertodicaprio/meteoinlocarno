<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteo in Locarno</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <div class="container">
        <div id="loading"> Loading weather data...</div>
        <div id="error"></div>

        <section id="current-weather"></section>

        <h2 class="hourly-section-title">24-Hour Forecast</h2>
        <div class="chart-container">
            <canvas id="hourlyChart"></canvas>
        </div>

        <h2 class="chart-section-title">7-Day Forecast Chart</h2>
        <div class="chart-container">
            <canvas id="temperatureChart"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
